<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Map — Validator</title>
<style>
:root { --bg: #0f1117; --bg2: #1a1d27; --bg3: #242736; --border: #2e3144; --text: #e1e4ed; --text2: #9ba1b5; --accent: #6c8cff; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); padding:32px; }
h1 { font-size:22px; margin-bottom:20px; }
h1 span { color:var(--accent); }
.controls { display:flex; gap:12px; align-items:center; margin-bottom:24px; }
select, button { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:6px; font-size:14px; cursor:pointer; }
select:hover, button:hover { border-color:var(--accent); }
button { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
.results { max-width:900px; }
.section { margin-bottom:20px; }
.section h3 { font-size:14px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.check { display:flex; align-items:flex-start; gap:8px; padding:6px 10px; border-radius:6px; font-size:13px; margin-bottom:4px; }
.check.pass { background:rgba(34,211,153,.08); }
.check.fail { background:rgba(248,113,113,.08); }
.check.warn { background:rgba(251,191,36,.08); }
.check .icon { font-size:16px; flex-shrink:0; }
.check .msg { flex:1; }
.check .detail { color:var(--text2); font-size:11px; margin-top:2px; }
.summary { font-size:16px; font-weight:600; padding:16px; border-radius:8px; margin-top:16px; }
.summary.all-pass { background:rgba(34,211,153,.1); color:var(--green); border:1px solid rgba(34,211,153,.3); }
.summary.has-fail { background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.3); }
</style>
</head>
<body>
<h1><span>Knowledge Map</span> — Validator</h1>
<div class="controls">
  <select id="topic-select"><option value="">Loading...</option></select>
  <button onclick="runValidation()">Validate</button>
</div>
<div class="results" id="results"></div>

<script>
let topicRegistry = [];

async function loadRegistry() {
  const resp = await fetch('topics/index.json');
  topicRegistry = await resp.json();
  const sel = document.getElementById('topic-select');
  sel.innerHTML = topicRegistry.map(t =>
    '<option value="' + t.id + '">' + t.icon + ' ' + t.label + '</option>'
  ).join('');
}

function check(pass, msg, detail) {
  return { pass, msg, detail: detail || '' };
}

async function runValidation() {
  const id = document.getElementById('topic-select').value;
  if (!id) return;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<p style="color:var(--text2)">Loading...</p>';

  let data;
  try {
    const resp = await fetch('topics/' + id + '.json');
    const text = await resp.text();
    data = JSON.parse(text);
  } catch(e) {
    resultsEl.innerHTML = '<div class="check fail"><span class="icon">❌</span><span class="msg">Failed to load/parse JSON: ' + e.message + '</span></div>';
    return;
  }

  const checks = { structural: [], referential: [], content: [] };

  // --- Structural checks ---
  checks.structural.push(check(!!data.meta, 'meta object exists'));
  checks.structural.push(check(!!data.nodes, 'nodes object exists'));
  checks.structural.push(check(!!data.hierarchy, 'hierarchy object exists'));
  checks.structural.push(check(Array.isArray(data.edges), 'edges array exists'));
  checks.structural.push(check(!!data.nodes?.root, 'root node exists'));

  const nodeCount = Object.keys(data.nodes || {}).length;
  checks.structural.push(check(nodeCount > 0, nodeCount + ' nodes found'));
  checks.structural.push(check(data.edges?.length > 0, (data.edges?.length || 0) + ' edges found'));

  // Required fields
  const requiredFields = ['label', 'icon', 'category', 'summary'];
  let missingFields = 0;
  const missingDetails = [];
  for (const [nid, node] of Object.entries(data.nodes || {})) {
    for (const field of requiredFields) {
      if (!node[field]) {
        missingFields++;
        missingDetails.push(nid + ' missing ' + field);
      }
    }
  }
  checks.structural.push(check(missingFields === 0,
    missingFields === 0 ? 'All nodes have required fields (label, icon, category, summary)' : missingFields + ' missing required fields',
    missingDetails.slice(0, 10).join('; ') + (missingDetails.length > 10 ? '...' : '')
  ));

  // --- Referential integrity ---
  // All hierarchy children exist in nodes
  let missingChildren = 0;
  const missingChildDetails = [];
  for (const [parent, children] of Object.entries(data.hierarchy || {})) {
    if (!data.nodes[parent]) {
      missingChildren++;
      missingChildDetails.push('parent "' + parent + '" not in nodes');
    }
    for (const cid of children) {
      if (!data.nodes[cid]) {
        missingChildren++;
        missingChildDetails.push('"' + cid + '" (child of ' + parent + ') not in nodes');
      }
    }
  }
  checks.referential.push(check(missingChildren === 0,
    missingChildren === 0 ? 'All hierarchy references resolve' : missingChildren + ' broken hierarchy refs',
    missingChildDetails.slice(0, 10).join('; ')
  ));

  // All edge endpoints exist
  let missingEdges = 0;
  const missingEdgeDetails = [];
  for (const edge of (data.edges || [])) {
    if (!data.nodes[edge.from]) { missingEdges++; missingEdgeDetails.push('from: ' + edge.from); }
    if (!data.nodes[edge.to]) { missingEdges++; missingEdgeDetails.push('to: ' + edge.to); }
  }
  checks.referential.push(check(missingEdges === 0,
    missingEdges === 0 ? 'All edge endpoints resolve' : missingEdges + ' broken edge refs',
    missingEdgeDetails.slice(0, 10).join('; ')
  ));

  // Reachability from root
  const reachable = new Set();
  function walk(nid) {
    if (reachable.has(nid)) return;
    reachable.add(nid);
    if (data.hierarchy[nid]) data.hierarchy[nid].forEach(walk);
  }
  if (data.nodes?.root) walk('root');
  const unreachable = Object.keys(data.nodes || {}).filter(id => !reachable.has(id));
  checks.referential.push(check(unreachable.length === 0,
    unreachable.length === 0 ? 'All ' + nodeCount + ' nodes reachable from root' : unreachable.length + ' orphan nodes',
    unreachable.slice(0, 10).join(', ')
  ));

  // No duplicate children
  let dupes = 0;
  for (const [parent, children] of Object.entries(data.hierarchy || {})) {
    const seen = new Set();
    for (const cid of children) {
      if (seen.has(cid)) { dupes++; }
      seen.add(cid);
    }
  }
  checks.referential.push(check(dupes === 0,
    dupes === 0 ? 'No duplicate children in hierarchy' : dupes + ' duplicate children'
  ));

  // --- Content checks ---
  const knownCats = ['value-chain','power','hardware','software','market','opportunity','strategy','player','risk','construction','cooling','integration','operations'];
  const unknownCats = new Set();
  for (const [nid, node] of Object.entries(data.nodes || {})) {
    if (node.category && !knownCats.includes(node.category)) unknownCats.add(node.category);
  }
  checks.content.push(check(unknownCats.size === 0,
    unknownCats.size === 0 ? 'All categories are known values' : unknownCats.size + ' unknown categories',
    [...unknownCats].join(', ')
  ));

  // Nodes with details
  let withDetails = 0, withNarrative = 0;
  for (const node of Object.values(data.nodes || {})) {
    if (node.details) withDetails++;
    if (node.narrative) withNarrative++;
  }
  checks.content.push(check(true, withDetails + '/' + nodeCount + ' nodes have details'));
  checks.content.push(check(true, withNarrative + '/' + nodeCount + ' nodes have narratives', 'Narrative is optional but recommended'));

  // Meta completeness
  checks.content.push(check(!!data.meta?.id && !!data.meta?.label && !!data.meta?.icon,
    data.meta?.id ? 'Meta complete: ' + data.meta.icon + ' ' + data.meta.label : 'Meta incomplete'
  ));

  // --- Render results ---
  let totalFail = 0;
  let html = '';
  for (const [section, items] of Object.entries(checks)) {
    html += '<div class="section"><h3>' + section + '</h3>';
    for (const item of items) {
      const cls = item.pass ? 'pass' : 'fail';
      const icon = item.pass ? '✅' : '❌';
      if (!item.pass) totalFail++;
      html += '<div class="check ' + cls + '"><span class="icon">' + icon + '</span><span class="msg">' + item.msg;
      if (item.detail) html += '<div class="detail">' + item.detail + '</div>';
      html += '</span></div>';
    }
    html += '</div>';
  }

  if (totalFail === 0) {
    html += '<div class="summary all-pass">✅ All checks passed!</div>';
  } else {
    html += '<div class="summary has-fail">❌ ' + totalFail + ' check(s) failed</div>';
  }
  resultsEl.innerHTML = html;
}

loadRegistry();
</script>
</body>
</html>
