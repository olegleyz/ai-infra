<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Data Center Ecosystem Map</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242736;
  --border: #2e3144;
  --text: #e1e4ed;
  --text2: #9ba1b5;
  --accent: #6c8cff;
  --accent2: #4a6bff;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --purple: #a78bfa;
  --pink: #f472b6;
  --cyan: #22d3ee;
  --cat-value-chain: #6c8cff;
  --cat-power: #fbbf24;
  --cat-hardware: #34d399;
  --cat-software: #a78bfa;
  --cat-market: #fb923c;
  --cat-opportunity: #22d3ee;
  --cat-strategy: #f472b6;
  --cat-player: #60a5fa;
  --cat-risk: #f87171;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
#app { display: flex; height: 100vh; flex-direction: column; }

/* Top bar */
#topbar { display:flex; align-items:center; gap:12px; padding:10px 20px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; z-index:100; }
#topbar h1 { font-size:16px; font-weight:600; white-space:nowrap; }
#topbar h1 span { color:var(--accent); }
#breadcrumbs { display:flex; gap:4px; align-items:center; font-size:13px; flex:1; overflow-x:auto; }
#breadcrumbs .crumb { color:var(--text2); cursor:pointer; white-space:nowrap; padding:4px 8px; border-radius:4px; transition:all .15s; }
#breadcrumbs .crumb:hover { background:var(--bg3); color:var(--text); }
#breadcrumbs .crumb.active { color:var(--accent); font-weight:600; }
#breadcrumbs .sep { color:var(--border); font-size:11px; }
#search-box { position:relative; }
#search-box input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:6px 12px 6px 32px; border-radius:6px; font-size:13px; width:220px; outline:none; }
#search-box input:focus { border-color:var(--accent); }
#search-box svg { position:absolute; left:8px; top:50%; transform:translateY(-50%); }
#search-results { position:absolute; top:100%; right:0; background:var(--bg2); border:1px solid var(--border); border-radius:8px; width:320px; max-height:400px; overflow-y:auto; display:none; z-index:200; margin-top:4px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
#search-results.show { display:block; }
#search-results .sr-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); }
#search-results .sr-item:hover { background:var(--bg3); }
#search-results .sr-item .sr-label { font-size:13px; font-weight:500; }
#search-results .sr-item .sr-path { font-size:11px; color:var(--text2); margin-top:2px; }

/* Main content area */
#main { display:flex; flex:1; overflow:hidden; }

/* Tree sidebar */
#sidebar { width:280px; background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; flex-shrink:0; padding:12px 0; transition:width .2s; }
#sidebar.collapsed { width:0; padding:0; overflow:hidden; }
.tree-item { padding:5px 12px 5px calc(12px + var(--depth,0) * 16px); cursor:pointer; font-size:13px; display:flex; align-items:center; gap:6px; transition: background .1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tree-item:hover { background:var(--bg3); }
.tree-item.active { background:var(--bg3); color:var(--accent); font-weight:600; }
.tree-item .arrow { font-size:10px; width:14px; text-align:center; color:var(--text2); transition:transform .15s; flex-shrink:0; }
.tree-item .arrow.open { transform:rotate(90deg); }
.tree-item .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.tree-children { overflow:hidden; }
.tree-children.collapsed { display:none; }

/* Toggle sidebar button */
#sidebar-toggle { position:absolute; left:280px; top:50%; transform:translateY(-50%); z-index:50; background:var(--bg2); border:1px solid var(--border); color:var(--text2); width:20px; height:40px; border-radius:0 6px 6px 0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:left .2s; }
#sidebar-toggle:hover { color:var(--text); background:var(--bg3); }
#sidebar-toggle.shifted { left:0; }

/* Graph area */
#graph-area { flex:1; position:relative; overflow:hidden; }
#graph-container { position:absolute; inset:0; overflow:auto; padding:32px; }

/* Level indicator */
#level-header { padding:0 0 20px 0; }
#level-header h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
#level-header .level-desc { font-size:14px; color:var(--text2); max-width:800px; line-height:1.5; }

/* Node grid */
#node-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:16px; max-width:1400px; }
.node-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:all .15s; position:relative; overflow:hidden; }
.node-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 20px rgba(108,140,255,.15); }
.node-card.expanded { border-color:var(--accent); }
.node-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
.node-card[data-cat="value-chain"]::before { background:var(--cat-value-chain); }
.node-card[data-cat="power"]::before { background:var(--cat-power); }
.node-card[data-cat="hardware"]::before { background:var(--cat-hardware); }
.node-card[data-cat="software"]::before { background:var(--cat-software); }
.node-card[data-cat="market"]::before { background:var(--cat-market); }
.node-card[data-cat="opportunity"]::before { background:var(--cat-opportunity); }
.node-card[data-cat="strategy"]::before { background:var(--cat-strategy); }
.node-card[data-cat="player"]::before { background:var(--cat-player); }
.node-card[data-cat="risk"]::before { background:var(--cat-risk); }
.node-card[data-cat="construction"]::before { background:#f59e0b; }
.node-card[data-cat="cooling"]::before { background:#06b6d4; }
.node-card[data-cat="integration"]::before { background:#8b5cf6; }
.node-card[data-cat="operations"]::before { background:#ec4899; }
.node-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.node-icon { font-size:24px; flex-shrink:0; }
.node-title { font-size:15px; font-weight:600; line-height:1.3; }
.node-summary { font-size:12px; color:var(--text2); line-height:1.5; margin-bottom:10px; }
.node-meta { display:flex; gap:6px; flex-wrap:wrap; }
.node-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.node-tag.stock { background:rgba(34,211,153,.1); color:var(--green); border-color:rgba(34,211,153,.3); }
.node-tag.bottleneck { background:rgba(248,113,113,.1); color:var(--red); border-color:rgba(248,113,113,.3); }
.node-tag.opportunity { background:rgba(34,211,238,.1); color:var(--cyan); border-color:rgba(34,211,238,.3); }
.node-tag.hot { background:rgba(251,191,36,.1); color:var(--yellow); border-color:rgba(251,191,36,.3); }
.node-children-count { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:4px; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); }
.node-children-count svg { opacity:.5; }

/* Detail panel - resizable */
#detail-panel { width:0; background:var(--bg2); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; position:relative; transition:width .2s; }
#detail-panel.open { width:420px; transition:none; }
#detail-panel.open .resize-handle { display:block; }
.resize-handle { display:none; position:absolute; top:0; left:-4px; bottom:0; width:8px; cursor:col-resize; z-index:10; }
.resize-handle:hover, .resize-handle.active { background:var(--accent); opacity:.3; }
#detail-content { padding:20px; min-width:320px; }
#detail-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text2); cursor:pointer; font-size:18px; padding:4px 8px; border-radius:4px; }
#detail-close:hover { background:var(--bg3); color:var(--text); }
#detail-content h2 { font-size:18px; font-weight:700; margin-bottom:4px; padding-right:30px; }
#detail-content .detail-cat { font-size:12px; color:var(--text2); margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; }
#detail-content .detail-body { font-size:13px; line-height:1.7; color:var(--text); }
#detail-content .detail-body h3 { font-size:14px; font-weight:600; margin:16px 0 8px; color:var(--accent); }
#detail-content .detail-body h4 { font-size:13px; font-weight:600; margin:12px 0 6px; color:var(--text); }
#detail-content .detail-body p { margin-bottom:10px; }
#detail-content .detail-body ul { margin:8px 0 12px 20px; }
#detail-content .detail-body li { margin-bottom:4px; font-size:13px; }
#detail-content .detail-body table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
#detail-content .detail-body th { text-align:left; padding:6px 8px; background:var(--bg3); border:1px solid var(--border); font-weight:600; color:var(--text2); }
#detail-content .detail-body td { padding:6px 8px; border:1px solid var(--border); }
#detail-content .detail-body .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
#detail-content .detail-body .stat-box { background:var(--bg3); border-radius:8px; padding:10px; text-align:center; }
#detail-content .detail-body .stat-box .stat-val { font-size:18px; font-weight:700; color:var(--accent); }
#detail-content .detail-body .stat-box .stat-label { font-size:11px; color:var(--text2); margin-top:2px; }
#detail-content .detail-body .bar-chart { margin:10px 0; }
#detail-content .detail-body .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; }
#detail-content .detail-body .bar-label { width:120px; text-align:right; color:var(--text2); flex-shrink:0; }
#detail-content .detail-body .bar-track { flex:1; height:20px; background:var(--bg); border-radius:4px; overflow:hidden; }
#detail-content .detail-body .bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:6px; font-size:10px; font-weight:600; color:var(--bg); }
#detail-content .detail-body .callout { background:var(--bg3); border-left:3px solid var(--accent); padding:10px 12px; border-radius:0 6px 6px 0; margin:12px 0; font-size:12px; }
#detail-content .detail-body .callout.warning { border-left-color:var(--yellow); }
#detail-content .detail-body .callout.danger { border-left-color:var(--red); }
#detail-content .detail-body .callout.success { border-left-color:var(--green); }
.detail-nav { margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.detail-nav h4 { font-size:12px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.detail-nav .nav-link { display:block; padding:6px 10px; font-size:13px; color:var(--accent); cursor:pointer; border-radius:4px; margin-bottom:2px; }
.detail-nav .nav-link:hover { background:var(--bg3); }

/* Flow diagram (for value chain view) */
.flow-container { display:flex; flex-direction:column; gap:8px; max-width:1000px; }
.flow-row { display:flex; align-items:center; gap:0; }
.flow-node { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; cursor:pointer; transition:all .15s; flex:1; max-width:300px; position:relative; }
.flow-node:hover { border-color:var(--accent); transform:scale(1.02); }
.flow-node .flow-label { font-size:14px; font-weight:600; }
.flow-node .flow-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.flow-arrow { color:var(--border); font-size:20px; padding:0 4px; flex-shrink:0; text-align:center; }
.flow-arrow.down { display:flex; justify-content:center; padding:2px 0; }

/* Connection map for overview */
.overview-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px; max-width:1200px; }
.overview-card { background:var(--bg2); border:2px solid var(--border); border-radius:16px; padding:24px; cursor:pointer; transition:all .2s; }
.overview-card:hover { border-color:var(--accent); transform:translateY(-4px); box-shadow:0 8px 32px rgba(108,140,255,.2); }
.overview-card .ov-icon { font-size:36px; margin-bottom:12px; }
.overview-card .ov-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.overview-card .ov-desc { font-size:13px; color:var(--text2); line-height:1.5; margin-bottom:12px; }
.overview-card .ov-stats { display:flex; gap:12px; }
.overview-card .ov-stat { font-size:12px; }
.overview-card .ov-stat strong { color:var(--accent); }

/* Narrative */
.narrative { font-size:14px; line-height:1.8; color:var(--text); margin-bottom:16px; padding:12px 16px; background:var(--bg); border-radius:8px; border-left:3px solid var(--accent); }
.narrative strong { color:var(--accent); }

/* Connected nodes (graph edges) */
.connections { margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.connections h4 { font-size:12px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.connections h4 svg { opacity:.5; }
.conn-item { display:flex; align-items:flex-start; gap:8px; padding:6px 10px; border-radius:6px; cursor:pointer; margin-bottom:2px; font-size:12px; transition:background .1s; }
.conn-item:hover { background:var(--bg3); }
.conn-arrow { color:var(--text2); flex-shrink:0; margin-top:2px; }
.conn-label { color:var(--text2); flex:1; }
.conn-target { color:var(--accent); font-weight:500; white-space:nowrap; flex-shrink:0; }
.conn-type { font-size:10px; padding:1px 6px; border-radius:8px; background:var(--bg3); color:var(--text2); flex-shrink:0; }

/* Comments */
.comment-section { margin-top:16px; padding-top:12px; border-top:1px solid var(--border); }
.comment-section h4 { font-size:12px; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.comment-textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:8px 10px; font-size:12px; font-family:inherit; resize:vertical; min-height:60px; outline:none; }
.comment-textarea:focus { border-color:var(--accent); }
.comment-textarea::placeholder { color:var(--text2); opacity:.6; }
.comment-saved { font-size:11px; color:var(--green); margin-top:4px; opacity:0; transition:opacity .3s; }
.comment-saved.show { opacity:1; }
.has-comment { position:relative; }
.has-comment::after { content:'💬'; position:absolute; top:8px; right:8px; font-size:12px; }

/* Action buttons */
.action-btns { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.action-btn { font-size:11px; padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:4px; }
.action-btn:hover { border-color:var(--accent); color:var(--text); }
#export-btn { position:fixed; bottom:12px; right:12px; z-index:200; font-size:12px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg2); color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:6px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
#export-btn:hover { border-color:var(--accent); color:var(--text); }

/* Responsive */
@media (max-width:768px) {
  #sidebar { display:none; }
  #detail-panel.open { width:100%; position:absolute; z-index:100; }
  .overview-grid { grid-template-columns:1fr; }
  #node-grid { grid-template-columns:1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text2); }

/* Legend */
#legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); }
.legend-dot { width:10px; height:10px; border-radius:50%; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1><span>AI</span> DC Ecosystem Map</h1>
    <div id="breadcrumbs"></div>
    <div id="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ba1b5" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search nodes..." autocomplete="off">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="main">
    <div id="sidebar"></div>
    <div id="graph-area">
      <div id="graph-container">
        <div id="level-header"></div>
        <div id="legend"></div>
        <div id="node-grid"></div>
      </div>
    </div>
    <div id="detail-panel">
      <div class="resize-handle" id="resize-handle"></div>
      <div id="detail-content" style="position:relative;">
        <button id="detail-close" onclick="closeDetail()">&times;</button>
      </div>
    </div>
  </div>
  <button id="export-btn" onclick="exportComments()" title="Export all your comments for Claude">📋 Export Comments</button>
</div>

<script>
// =====================================================
// GRAPH CONNECTIONS - Links between any two nodes (not just parent-child)
// These enable "Related Nodes" navigation in the detail panel
// =====================================================
const CONNECTIONS = [
  // Grid crisis impacts
  {from:"grid-queues", to:"power-equipment", label:"Drives extreme demand for transformers & switchgear", type:"causes"},

  {from:"phase1", to:"opp-workforce", label:"Start here: specialty services company", type:"implements"},

  {from:"phase3", to:"opp-neocloud", label:"Potentially evolve toward neocloud with track record", type:"evolves-to"},

                narrative: `Think of grid interconnection like plugging a small city into the power grid. A 100MW data center draws as much electricity as 80,000 homes. You can't just flip a switch — the grid operator needs to study whether the wires, transformers, and power plants can handle your load without causing blackouts for everyone else. This study process takes <strong>5 years on average</strong> in the US (it was 2 years in 2008). In the UK, the queue of data centers waiting for power connections is <strong>larger than the entire country's peak electricity demand</strong>. This is why power has replaced land as the #1 constraint — you can have the money, the land, the GPUs, and the building, but without grid approval, none of it works.`,

<h4>What Is Grid Interconnection?</h4>
<p>To power a DC, you must physically connect it to the electricity grid. This means:</p>
<ul>
<li>Building or upgrading a <strong>substation</strong> (steps down high-voltage transmission to usable medium voltage)</li>
<li>Running <strong>transmission lines</strong> from the grid to your site</li>
<li>Getting the grid operator to study whether the grid can handle your load without destabilizing neighbors</li>
<li>Parties involved: <strong>DC developer</strong> (applicant), <strong>utility</strong> (builds local infrastructure), <strong>grid operator/ISO</strong> (manages grid reliability), <strong>regulator</strong> (approves)</li>

                  tags: ["bottleneck"],
                  details: `<h3>US Grid Interconnection Crisis</h3>
<h4>How US Queues Work</h4>
<p>The US grid is managed by regional ISOs (Independent System Operators). To connect a large load, you apply to the ISO, which conducts studies (feasibility, system impact, facilities). Each study takes months-years. If grid upgrades are needed, the developer often pays.</p>
<h4>By Region</h4>
<table><tr><th>ISO/RTO</th><th>Coverage</th><th>Queue Status</th><th>DC Impact</th></tr>
<tr><td style="color:var(--red)"><strong>PJM</strong></td><td>VA, MD, PA, OH, NJ — DC CAPITAL</td><td>4,000 MW new DC load vs 2,100 MW substation capacity. $100B projected consumer cost increase through 2033.</td><td>NoVA expansion FROZEN. Dec 2025 FERC ruling created new co-location rules.</td></tr>
<tr><td style="color:var(--green)"><strong>ERCOT</strong></td><td>Texas</td><td>233 GW of large load requests (70%+ from DCs). Phased interconnection model = faster.</td><td>Fastest in US — driving massive DC migration to Texas</td></tr>
<tr><td style="color:var(--orange)"><strong>MISO</strong></td><td>Midwest, South</td><td>2-4 years. Large backlog.</td><td>Some DC growth in Indiana, Mississippi</td></tr>
<tr><td style="color:var(--orange)"><strong>SPP</strong></td><td>Central US</td><td>2-3 years</td><td>Oklahoma, Kansas seeing interest</td></tr>
<tr><td style="color:var(--yellow)"><strong>CAISO</strong></td><td>California</td><td>2-3 years but expensive power</td><td>Limited DC growth, high costs</td></tr>
<tr><td style="color:var(--orange)"><strong>NYISO</strong></td><td>New York</td><td>3-5 years</td><td>Some growth upstate near hydro</td></tr></table>
<h4>Why It Got So Bad</h4>
<ul>
<li>Queue designed for a few large power plants/year. Now flooded with thousands of solar, wind, battery, AND data center applications simultaneously</li>
<li>Grid barely grew in 20 years. Adding 30-70 GW of DC load is unprecedented</li>
<li>"First-come, first-served" = speculative applications clog the queue</li>
</ul>
<h4>FERC Order 2023 Reform</h4>
<ul>
<li>Shifts to "first-ready, first-served" — applicants must prove financial readiness</li>
<li>Cluster-based study process (batches of applications studied together)</li>
<li>Higher deposits to deter speculative applications</li>
<li>Still being implemented. Full effects not felt until 2027+</li>
</ul>`, children: [] },

                  { id: "grid-impact", label: "Impact on AI DC Ecosystem", icon: "🔗", category: "risk", summary: "Grid crisis ripples through EVERY layer: construction timelines, GPU deployment, land values, geographic distribution, power equipment demand.",
                  tags: ["hot"],
                  details: `<h3>How Grid Crisis Impacts Everything Else</h3>

<tr><td><strong>Transformer Demand</strong></td><td>30% supply shortfall. Prices up 77-95% since 2019. Lead times 128+ weeks. Queue backlog = deferred orders all hitting at once.</td></tr>

<tr><td><strong>Modular DC Adoption</strong></td><td>If you can't get power for 5 years, modular = deploy faster once power arrives. Also works for incremental capacity at constrained sites.</td></tr>

                  { id: "grid-workarounds", label: "Workarounds & Innovations", icon: "💡", category: "opportunity", summary: "Behind-the-meter generation, nuclear co-location, DC-owned substations, microgrids, demand response — and who benefits.",

        { id: "certifications", label: "Fastest Certifications", icon: "📜", category: "strategy", summary: "BICSI IN1 (5 days) + liquid cooling (2-4 wks) + OSHA/NFPA (1 wk) = 6-8 weeks to deployable technician", details: `<h3>Certification Paths (Ranked by Speed)</h3><h4>Tier 1: 1-4 weeks</h4><ul><li>OSHA 30-Hour Construction (1 week, $200-500)</li><li>BICSI Installer 1 / IN1 (5 days, $2,500-4,000)</li><li>CompTIA Server+ (2-4 weeks, $350)</li></ul><h4>Tier 2: 1-3 months</h4><ul><li>BICSI Installer 2 / IN2 (2-3 months)</li><li>DCCA by CNet Training (3-5 days, $3-5K)</li><li>EPA Section 608 (1-2 weeks, $300-500)</li><li>Vendor training: Schneider, Vertiv, CoolIT (1-2 weeks each)</li></ul><h4>Sweet Spot Combo (6-8 weeks total)</h4><ul><li>BICSI IN1 (5 days) → immediately deployable for cabling</li><li>Liquid cooling vendor training (2-4 weeks) → #1 emerging skill gap</li><li>OSHA 30 + NFPA 70E (1 week) → safety compliance</li><li><strong>Result: $35-55/hr billing rate, massive demand</strong></li></ul>`, children: [] }

};

// =====================================================
// APPLICATION LOGIC
// =====================================================
let currentPath = ["root"];
let selectedNodeId = null;
let allNodes = {};

// Flatten tree for search
function indexNodes(node, path = []) {
  const fullPath = [...path, node.id];
  allNodes[node.id] = { ...node, path: fullPath };
  if (node.children) {
    node.children.forEach(c => indexNodes(c, fullPath));
  }
}
indexNodes(DATA);

function getNode(id) { return allNodes[id]; }

function getNodeByPath(path) {
  let node = DATA;
  for (let i = 1; i < path.length; i++) {
    node = node.children.find(c => c.id === path[i]);
    if (!node) return null;
  }
  return node;
}

function getCurrentNode() {
  return getNodeByPath(currentPath);
}

// Category colors
const CAT_COLORS = {
  'value-chain': '#6c8cff', 'power': '#fbbf24', 'hardware': '#34d399',
  'software': '#a78bfa', 'market': '#fb923c', 'opportunity': '#22d3ee',
  'strategy': '#f472b6', 'player': '#60a5fa', 'risk': '#f87171',
  'construction': '#f59e0b', 'cooling': '#06b6d4', 'integration': '#8b5cf6',
  'operations': '#ec4899'
};
const CAT_LABELS = {
  'value-chain': 'Value Chain', 'power': 'Power & Energy', 'hardware': 'Hardware',
  'software': 'Software', 'market': 'Market', 'opportunity': 'Opportunity',
  'strategy': 'Strategy', 'player': 'Player', 'risk': 'Risk',
  'construction': 'Construction', 'cooling': 'Cooling', 'integration': 'Integration',
  'operations': 'Operations'
};

// Render breadcrumbs
function renderBreadcrumbs() {
  const el = document.getElementById('breadcrumbs');
  el.innerHTML = '';
  currentPath.forEach((id, i) => {
    const node = getNode(id);
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      el.appendChild(sep);
    }
    const crumb = document.createElement('span');
    crumb.className = 'crumb' + (i === currentPath.length - 1 ? ' active' : '');
    crumb.textContent = node ? (node.icon + ' ' + node.label) : id;
    crumb.onclick = () => navigateTo(currentPath.slice(0, i + 1));
    el.appendChild(crumb);
  });
}

// Render sidebar tree
function renderTree() {
  const el = document.getElementById('sidebar');
  el.innerHTML = '';
  function renderNode(node, depth = 0) {
    const item = document.createElement('div');
    item.className = 'tree-item' + (selectedNodeId === node.id ? ' active' : '');
    item.style.setProperty('--depth', depth);
    const hasChildren = node.children && node.children.length > 0;
    const arrow = document.createElement('span');
    arrow.className = 'arrow' + (currentPath.includes(node.id) ? ' open' : '');
    arrow.textContent = hasChildren ? '▶' : '';
    item.appendChild(arrow);
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = CAT_COLORS[node.category] || '#666';
    item.appendChild(dot);
    const label = document.createElement('span');
    label.textContent = node.icon + ' ' + node.label;
    item.appendChild(label);
    item.onclick = (e) => {
      e.stopPropagation();
      if (hasChildren) {
        navigateTo(allNodes[node.id].path);
      } else {
        selectNode(node.id);
      }
    };
    el.appendChild(item);
    if (hasChildren && currentPath.includes(node.id)) {
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      node.children.forEach(c => renderNode(c, depth + 1));
    }
  }
  renderNode(DATA);
}

// Render node grid
function renderGrid() {
  const node = getCurrentNode();
  if (!node) return;
  const header = document.getElementById('level-header');
  header.innerHTML = `<h2>${node.icon} ${node.label}</h2><div class="level-desc">${node.summary}</div>`;

  // Legend
  const legend = document.getElementById('legend');
  const cats = new Set();
  if (node.children) node.children.forEach(c => cats.add(c.category));
  legend.innerHTML = '';
  cats.forEach(cat => {
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${CAT_COLORS[cat]||'#666'}"></span>${CAT_LABELS[cat]||cat}`;
    legend.appendChild(item);
  });

  const grid = document.getElementById('node-grid');
  grid.innerHTML = '';

  if (!node.children || node.children.length === 0) {
    // Leaf node — show details inline
    grid.innerHTML = `<div style="max-width:800px">${node.details || '<p>No additional details yet.</p>'}</div>`;
    return;
  }

  node.children.forEach(child => {
    const card = document.createElement('div');
    card.className = 'node-card' + (getComment(child.id) ? ' has-comment' : '');
    card.dataset.cat = child.category;
    card.onclick = () => {
      if (child.children && child.children.length > 0) {
        navigateTo([...currentPath, child.id]);
      } else {
        selectNode(child.id);
      }
    };
    // Right-click or long-press for detail view
    card.oncontextmenu = (e) => { e.preventDefault(); selectNode(child.id); };

    let tagsHtml = '';
    if (child.tags) {
      tagsHtml = '<div class="node-meta">' + child.tags.map(t => {
        let cls = 'node-tag';
        if (t.startsWith('stock:')) cls += ' stock';
        else if (t === 'bottleneck') cls += ' bottleneck';
        else if (t === 'opportunity') cls += ' opportunity';
        else if (t === 'hot') cls += ' hot';
        return `<span class="${cls}">${t.startsWith('stock:') ? '$'+t.slice(6) : t}</span>`;
      }).join('') + '</div>';
    }

    const connCount = CONNECTIONS.filter(c => c.from === child.id || c.to === child.id).length;
    let childCount = '';
    const connBadge = connCount > 0 ? ` · ${connCount} connections` : '';
    if (child.children && child.children.length > 0) {
      childCount = `<div class="node-children-count">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        ${child.children.length} sub-topics${connBadge} — click to explore
      </div>`;
    } else {
      childCount = `<div class="node-children-count">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Click for details${connBadge}
      </div>`;
    }

    card.innerHTML = `
      <div class="node-header">
        <span class="node-icon">${child.icon}</span>
        <span class="node-title">${child.label}</span>
      </div>
      <div class="node-summary">${child.summary}</div>
      ${tagsHtml}
      ${childCount}
    `;
    grid.appendChild(card);
  });
}

// Navigate to a path
function navigateTo(path) {
  currentPath = path;
  selectedNodeId = null;
  renderBreadcrumbs();
  renderTree();
  renderGrid();
  closeDetail();
  document.getElementById('graph-container').scrollTop = 0;
}

// Get graph connections for a node
function getConnections(nodeId) {
  return CONNECTIONS.filter(c => c.from === nodeId || c.to === nodeId).map(c => {
    const isSource = c.from === nodeId;
    const targetId = isSource ? c.to : c.from;
    const target = getNode(targetId);
    if (!target) return null;
    return {
      targetId, target,
      label: c.label,
      type: c.type,
      direction: isSource ? '→' : '←'
    };
  }).filter(Boolean);
}

// Comment system (localStorage)
function getComment(nodeId) {
  try { return localStorage.getItem('aidc-comment-' + nodeId) || ''; } catch(e) { return ''; }
}
function saveComment(nodeId, text) {
  try {
    if (text.trim()) localStorage.setItem('aidc-comment-' + nodeId, text);
    else localStorage.removeItem('aidc-comment-' + nodeId);
  } catch(e) {}
}
function getAllComments() {
  const comments = {};
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('aidc-comment-')) {
        const nodeId = key.replace('aidc-comment-', '');
        const node = getNode(nodeId);
        comments[nodeId] = { label: node ? node.label : nodeId, text: localStorage.getItem(key) };
      }
    }
  } catch(e) {}
  return comments;
}
function exportComments() {
  const comments = getAllComments();
  const entries = Object.entries(comments);
  if (entries.length === 0) { alert('No comments yet. Add comments to nodes in the detail panel.'); return; }
  let text = '# My Comments on AI DC Ecosystem Map\n# ' + new Date().toISOString().slice(0,10) + '\n\n';
  entries.forEach(([id, c]) => {
    text += '## ' + c.label + ' (' + id + ')\n' + c.text + '\n\n';
  });
  // Copy to clipboard
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('export-btn');
    btn.textContent = '✅ Copied to clipboard!';
    setTimeout(() => { btn.innerHTML = '📋 Export Comments'; }, 2000);
  }).catch(() => {
    // Fallback: download as file
    const blob = new Blob([text], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'aidc-comments.md'; a.click();
    URL.revokeObjectURL(url);
  });
}
function copyForClaude(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  const comment = getComment(nodeId);
  const conns = getConnections(nodeId);
  let text = 'I am looking at the node "' + node.label + '" in my AI DC knowledge map.\n\n';
  text += 'Summary: ' + node.summary + '\n\n';
  if (comment) text += 'My comment/question: ' + comment + '\n\n';
  if (conns.length > 0) text += 'Connected to: ' + conns.map(c => c.target.label + ' (' + c.label + ')').join(', ') + '\n\n';
  text += 'Please help me understand this deeper / answer my questions.';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-claude-btn');
    if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy for Claude'; }, 2000); }
  });
}

// Select a node (show detail panel)
function selectNode(id) {
  selectedNodeId = id;
  const node = getNode(id);
  if (!node) return;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  panel.classList.add('open');

  const conns = getConnections(id);
  const comment = getComment(id);
  const hasNarrative = node.narrative;

  let connectionsHtml = '';
  if (conns.length > 0) {
    connectionsHtml = `<div class="connections">
      <h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg> Connected Nodes (${conns.length})</h4>
      ${conns.map(c => `<div class="conn-item" onclick="goToNode('${c.targetId}')">
        <span class="conn-arrow">${c.direction}</span>
        <span class="conn-target">${c.target.icon} ${c.target.label}</span>
        <span class="conn-label">${c.label}</span>
      </div>`).join('')}
    </div>`;
  }

  let commentHtml = `<div class="comment-section">
    <h4>Your Notes</h4>
    <textarea class="comment-textarea" placeholder="Add your thoughts, questions, or feedback about this topic..." oninput="saveComment('${id}', this.value); document.getElementById('comment-saved-${id}').classList.add('show'); setTimeout(()=>document.getElementById('comment-saved-${id}').classList.remove('show'),1500)">${comment}</textarea>
    <div class="comment-saved" id="comment-saved-${id}">Saved</div>
    <div class="action-btns">
      <button class="action-btn copy-claude-btn" onclick="copyForClaude('${id}')">📋 Copy for Claude</button>
    </div>
  </div>`;

  content.innerHTML = `
    <button id="detail-close" onclick="closeDetail()">&times;</button>
    <h2>${node.icon} ${node.label}</h2>
    <div class="detail-cat" style="color:${CAT_COLORS[node.category]||'#666'}">${CAT_LABELS[node.category]||node.category}</div>
    ${hasNarrative ? '<div class="narrative">' + node.narrative + '</div>' : ''}
    <div class="detail-body">${node.details || '<p>Details coming soon. This node can be extended with more research.</p>'}</div>
    ${node.children && node.children.length > 0 ? `
      <div class="detail-nav">
        <h4>Sub-topics</h4>
        ${node.children.map(c => `<div class="nav-link" onclick="navigateTo(allNodes['${c.id}'].path)">${c.icon} ${c.label}</div>`).join('')}
      </div>
    ` : ''}
    ${connectionsHtml}
    ${commentHtml}
  `;
  renderTree();
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedNodeId = null;
  renderTree();
}

// Search
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (q.length < 2) { searchResults.classList.remove('show'); return; }
  const results = Object.values(allNodes).filter(n =>
    n.label.toLowerCase().includes(q) ||
    (n.summary && n.summary.toLowerCase().includes(q)) ||
    (n.tags && n.tags.some(t => t.toLowerCase().includes(q)))
  ).slice(0, 10);
  if (results.length === 0) { searchResults.classList.remove('show'); return; }
  searchResults.innerHTML = results.map(r => `
    <div class="sr-item" onclick="goToNode('${r.id}')">
      <div class="sr-label">${r.icon} ${r.label}</div>
      <div class="sr-path">${r.path.map(p => getNode(p)?.label || p).join(' › ')}</div>
    </div>
  `).join('');
  searchResults.classList.add('show');
});
searchInput.addEventListener('blur', () => setTimeout(() => searchResults.classList.remove('show'), 200));

function goToNode(id) {
  const node = getNode(id);
  if (!node) return;
  searchInput.value = '';
  searchResults.classList.remove('show');
  if (node.children && node.children.length > 0) {
    navigateTo(node.path);
  } else {
    // Navigate to parent, then select this node
    const parentPath = node.path.slice(0, -1);
    currentPath = parentPath.length > 0 ? parentPath : ['root'];
    renderBreadcrumbs();
    renderTree();
    renderGrid();
    selectNode(id);
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (selectedNodeId) { closeDetail(); }
    else if (currentPath.length > 1) { navigateTo(currentPath.slice(0, -1)); }
  }
  if (e.key === '/' && !e.ctrlKey && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// Resizable detail panel
(function() {
  const panel = document.getElementById('detail-panel');
  const handle = document.getElementById('resize-handle');
  let isResizing = false;
  let startX, startWidth;

  handle.addEventListener('mousedown', (e) => {
    isResizing = true;
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const diff = startX - e.clientX;
    const newWidth = Math.max(320, Math.min(startWidth + diff, window.innerWidth * 0.8));
    panel.style.width = newWidth + 'px';
    // Update content min-width to match
    document.getElementById('detail-content').style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// Initial render
navigateTo(['root']);
</script>
